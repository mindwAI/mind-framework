# MIND Framework — Hello World Example
# Simplified pipeline showing that optional steps can be skipped.

project_name: "hello-world-todo-app"
language: "en"

pipeline:
  - name: create-prd
    description: "Specify product requirements"
  - name: create-techspec
    description: "Design technical solution"
  - name: create-tasks
    description: "Decompose into incremental tasks"
  - name: execute-task
    description: "Implement each task"
  - name: execute-review
    description: "Review produced code"
  - name: execute-qa
    description: "Validate requirements and quality"

conventions:
  - code-standards
  - git-branching
  - tests
